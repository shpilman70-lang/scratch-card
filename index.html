<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרטיס גירוד - מצא את הקוד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f0f4f8;
            overflow: hidden;
            touch-action: none;
        }
        .scratch-container {
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            cursor: crosshair;
            touch-action: none;
        }
        .reveal-code {
            animation: zoomIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full text-center">
        <h1 class="text-4xl font-bold text-slate-800 mb-2">משימת הגירוד</h1>
        <p class="text-indigo-600 mb-8 text-xl font-semibold">גרדו את כל הכרטיס כדי לגלות את הקוד לחידה הבאה!</p>

        <!-- Card Area -->
        <div class="relative mx-auto w-80 h-80 sm:w-96 sm:h-96 bg-white rounded-3xl shadow-2xl overflow-hidden border-8 border-white scratch-container">
            
            <!-- Target Image (pic.png) -->
            <img src="pic.png" alt="[תמונת הפרס]" id="prize-image" 
                 class="absolute inset-0 w-full h-full object-cover select-none"
                 onerror="handleImageError(this)">
            
            <!-- Scratch Canvas -->
            <canvas id="scratch-canvas" class="absolute inset-0 w-full h-full z-10"></canvas>
        </div>

        <!-- Success Message and Code -->
        <div id="finish-msg" class="mt-8 opacity-0 pointer-events-none transition-all duration-700">
            <div class="bg-white p-6 rounded-2xl shadow-xl reveal-code inline-block border-2 border-indigo-500">
                <p class="text-lg text-slate-600 font-bold mb-2">כל הכבוד! הקוד לחידה הבאה הוא:</p>
                <div class="text-7xl font-black text-indigo-600 tracking-widest mb-4">247</div>
                <p class="text-sm text-slate-400 italic">זכרו את המספר והמשיכו הלאה</p>
            </div>
        </div>
    </div>

    <!-- Victory Sound -->
    <audio id="victory-sound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>

    <script>
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        const finishMsg = document.getElementById('finish-msg');
        const victorySound = document.getElementById('victory-sound');
        const prizeImg = document.getElementById('prize-image');
        let isDrawing = false;
        let isFinished = false;
        let lastX = 0;
        let lastY = 0;

        const brushRadius = 35;

        function init() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            ctx.globalCompositeOperation = 'source-over';
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#94a3b8');
            gradient.addColorStop(0.5, '#475569');
            gradient.addColorStop(1, '#1e293b');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold 30px Assistant';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('גרד את הכל!', canvas.width / 2, canvas.height / 2);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = brushRadius * 2;
        }

        // Modified error handler to log only once
        let errorLogged = false;
        function handleImageError(img) {
            if (!errorLogged) {
                console.warn("שימו לב: הקובץ pic.png לא נמצא בתיקייה. הקוד יציג תמונה חלופית עד שתעלו את הקובץ.");
                errorLogged = true;
            }
            img.src = 'https://via.placeholder.com/400x400?text=%D7%97%D7%A1%D7%A8+%D7%A7%D7%95%D7%91%D7%A5+pic.png';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            if (isFinished) return;
            isDrawing = true;
            const { x, y } = getPos(e);
            lastX = x;
            lastY = y;
            scratch(e);
        }

        function scratch(e) {
            if (!isDrawing || isFinished) return;
            e.preventDefault();

            const { x, y } = getPos(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();

            lastX = x;
            lastY = y;

            checkProgress();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function checkProgress() {
            if (isFinished) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;
            let clearPixels = 0;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) clearPixels++;
            }

            const percentage = (clearPixels / (pixels.length / 4)) * 100;
            
            if (percentage >= 98) {
                isFinished = true;
                
                victorySound.play().catch(err => console.log("צליל נחסם על ידי הדפדפן"));
                
                finishMsg.style.opacity = '1';
                finishMsg.style.pointerEvents = 'auto';
                
                canvas.style.transition = 'opacity 1s ease';
                canvas.style.opacity = '0';
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', scratch);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', scratch);
        canvas.addEventListener('touchend', stopDrawing);

        window.onload = init;
    </script>
</body>
</html>
